components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT from POST /api/did/login — use placeholder token in docs only

  parameters:
    XTraceId:
      name: X-Trace-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: Optional correlation id for audit (SECURITY-A9)
    DeviceCode:
      name: device_code
      in: path
      required: true
      schema:
        type: string
      example: DEVICE_CODE_PLACEHOLDER
    DeviceDid:
      name: device_did
      in: path
      required: true
      schema:
        type: string
      example: did:imbs:device:placeholder

  schemas:
    ErrorResponse:
      type: object
      description: Existing Result.error style — draft
      properties:
        code:
          type: integer
        message:
          type: string
      additionalProperties: true

    SuccessResponse:
      type: object
      description: Existing Result.success style — draft
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          additionalProperties: true
      additionalProperties: true

    TraceableResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
      description: Response may correlate with X-Trace-Id in logs; traceId not in body by default

    ModelingPredictRequest:
      type: object
      description: Draft placeholder schema for predict body
      additionalProperties: true
      example:
        timestamp: '2026-06-16T10:00:00'
        temperature: 24.5

    IoTCommandRequest:
      type: object
      required:
        - method
      properties:
        method:
          type: string
          example: set_temperature
        params:
          type: object
          additionalProperties: true
          example:
            value: 24
      additionalProperties: true

    IoTIngestRequest:
      type: object
      required:
        - device_code
        - data
      properties:
        device_code:
          type: string
          example: DEVICE_CODE_PLACEHOLDER
        data:
          type: object
          additionalProperties: true
      additionalProperties: true

    DidEntityRequest:
      type: object
      description: Draft placeholder — parent_did, entity_type_code, name, permissions required at runtime
      additionalProperties: true
      example:
        parent_did: did:imbs:system:root:placeholder
        entity_type_code: property
        name: Example Entity
        permissions:
          - device:read

    DidCredentialRequest:
      type: object
      description: Draft placeholder — issuer_did, subject_did required at runtime
      additionalProperties: true

  responses:
    Success:
      description: Success
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    UnauthorizedError:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Invalid token
    ForbiddenError:
      description: |
        Forbidden — valid JWT but missing required permission (A6B/A7B/A10B),
        or environment guard denied (e.g. SSE test in production, A8B).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 403
            message: 'Permission denied: requires [modeling:train]'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
