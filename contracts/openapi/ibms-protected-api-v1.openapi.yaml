openapi: 3.0.3
info:
  title: VANTARIS IBMS Protected API
  version: ibms.contract.v1
  description: |
    Draft protected API boundary for VANTARIS IBMS.
    Sources: SECURITY-A6, A7, A8B, A10, CONTRACTS-A1, CORE-A0.
    Schemas marked as draft placeholders where runtime bodies are not fully confirmed.

servers:
  - url: /api
    description: Legacy unversioned backend prefix (current)

security:
  - bearerAuth: []

tags:
  - name: Modeling
    description: Data modeling and prediction (JWT required)
  - name: IoT
    description: IoT write, command, and ingest (JWT required)
  - name: SSE
    description: Server-sent events
  - name: DID
    description: DID high-risk write operations (JWT required)
  - name: System
    description: System menu and version API (JWT required since MENU-JWT; permission pending)

paths:
  /modeling/csv/list:
    get:
      tags: [Modeling]
      summary: List CSV files
      operationId: modelingCsvList
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          description: CSV file list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /modeling/csv/{device_code}:
    get:
      tags: [Modeling]
      summary: Get device CSV info
      operationId: modelingCsvInfo
      parameters:
        - $ref: '#/components/parameters/DeviceCode'
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          description: Device CSV metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /modeling/{device_code}/train:
    post:
      tags: [Modeling]
      summary: Train model
      operationId: modelingTrain
      parameters:
        - $ref: '#/components/parameters/DeviceCode'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Draft placeholder — training parameters vary by device
              additionalProperties: true
      responses:
        '202':
          description: Training accepted
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /modeling/{device_code}/predict:
    post:
      tags: [Modeling]
      summary: Single-point predict
      operationId: modelingPredict
      parameters:
        - $ref: '#/components/parameters/DeviceCode'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelingPredictRequest'
      responses:
        '200':
          description: Prediction result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /modeling/{device_code}/predict_future:
    post:
      tags: [Modeling]
      summary: Multi-day forecast
      operationId: modelingPredictFuture
      parameters:
        - $ref: '#/components/parameters/DeviceCode'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Draft placeholder — e.g. days, city, electricity_price
              additionalProperties: true
      responses:
        '200':
          description: Forecast result
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /modeling/{device_code}/model_info:
    get:
      tags: [Modeling]
      summary: Get model metadata
      operationId: modelingModelInfo
      parameters:
        - $ref: '#/components/parameters/DeviceCode'
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          description: Model info
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /modeling/{device_code}/{method}:
    get:
      tags: [Modeling]
      summary: Generic predictor GET dispatch
      operationId: modelingCallGet
      parameters:
        - $ref: '#/components/parameters/DeviceCode'
        - name: method
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          description: Method result
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    post:
      tags: [Modeling]
      summary: Generic predictor POST dispatch
      operationId: modelingCallPost
      parameters:
        - $ref: '#/components/parameters/DeviceCode'
        - name: method
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Method result
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /iot/device/register:
    post:
      tags: [IoT]
      summary: Register device
      operationId: iotDeviceRegister
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Draft placeholder — device registration payload
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /iot/device/parent/{parent_did}:
    get:
      tags: [IoT]
      summary: List devices by parent DID
      description: Public read at runtime — JWT/auth decision pending.
      operationId: iotDevicesByParent
      security: []
      parameters:
        - name: parent_did
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '500':
          $ref: '#/components/responses/ServerError'

  /iot/device/did/{device_did}:
    get:
      tags: [IoT]
      summary: Get device by DID
      description: Public read at runtime — JWT/auth decision pending.
      operationId: iotDeviceGetByDid
      security: []
      parameters:
        - $ref: '#/components/parameters/DeviceDid'
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags: [IoT]
      summary: Update device
      operationId: iotDeviceUpdate
      parameters:
        - $ref: '#/components/parameters/DeviceDid'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    patch:
      tags: [IoT]
      summary: Partial update device
      operationId: iotDevicePatch
      parameters:
        - $ref: '#/components/parameters/DeviceDid'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    delete:
      tags: [IoT]
      summary: Delete device
      operationId: iotDeviceDelete
      parameters:
        - $ref: '#/components/parameters/DeviceDid'
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /iot/device/did/{device_did}/status:
    put:
      tags: [IoT]
      summary: Update device status
      operationId: iotDeviceStatus
      parameters:
        - $ref: '#/components/parameters/DeviceDid'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: integer
                  description: 0 offline, 1 online, 2 fault
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /iot/device/did/{device_did}/field-mappings:
    put:
      tags: [IoT]
      summary: Update field mappings
      operationId: iotFieldMappings
      parameters:
        - $ref: '#/components/parameters/DeviceDid'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /iot/device/did/{device_did}/method-mappings:
    put:
      tags: [IoT]
      summary: Update method mappings
      operationId: iotMethodMappings
      parameters:
        - $ref: '#/components/parameters/DeviceDid'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /iot/device/{device_did}/command:
    post:
      tags: [IoT]
      summary: Send command by DID
      operationId: iotCommandByDid
      parameters:
        - $ref: '#/components/parameters/DeviceDid'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IoTCommandRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /iot/device/code/{device_code}/command:
    post:
      tags: [IoT]
      summary: Send command by device code
      operationId: iotCommandByCode
      parameters:
        - $ref: '#/components/parameters/DeviceCode'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IoTCommandRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /iot/ingest/http:
    post:
      tags: [IoT]
      summary: HTTP telemetry ingest
      operationId: iotIngestHttp
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IoTIngestRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /iot/device/{device_code}/reconnect:
    post:
      tags: [IoT]
      summary: Reconnect device
      operationId: iotDeviceReconnect
      parameters:
        - $ref: '#/components/parameters/DeviceCode'
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /iot/device/code/{device_code}:
    get:
      tags: [IoT]
      summary: Get device by code
      description: Public read at runtime — JWT/auth decision pending.
      operationId: iotDeviceGetByCode
      security: []
      parameters:
        - $ref: '#/components/parameters/DeviceCode'
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/ServerError'

  /iot/device/{device_code}/sse-url:
    get:
      tags: [SSE]
      summary: Get SSE stream URL for device
      description: Public at runtime — returns relative stream URL for device_code.
      operationId: iotDeviceSseUrl
      security: []
      parameters:
        - $ref: '#/components/parameters/DeviceCode'
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '500':
          $ref: '#/components/responses/ServerError'

  /iot/device/{device_code}/stream:
    get:
      tags: [SSE]
      summary: Device SSE event stream
      description: Public at runtime (no JWT) — production auth hardening pending.
      operationId: iotDeviceStream
      security: []
      parameters:
        - $ref: '#/components/parameters/DeviceCode'
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string
        '500':
          $ref: '#/components/responses/ServerError'
    options:
      tags: [SSE]
      summary: CORS preflight for SSE stream
      operationId: iotDeviceStreamOptions
      security: []
      parameters:
        - $ref: '#/components/parameters/DeviceCode'
      responses:
        '200':
          description: CORS preflight response

  /iot/device/{device_code}/latest:
    get:
      tags: [SSE]
      summary: Latest device telemetry (polling fallback)
      description: Public read at runtime — auth decision pending.
      operationId: iotDeviceLatest
      security: []
      parameters:
        - $ref: '#/components/parameters/DeviceCode'
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '500':
          $ref: '#/components/responses/ServerError'

  /iot/{device_did}/field-mappings-info:
    get:
      tags: [IoT]
      summary: Get device field mappings
      description: Public read at runtime — JWT/auth decision pending.
      operationId: iotFieldMappingsInfo
      security: []
      parameters:
        - $ref: '#/components/parameters/DeviceDid'
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/ServerError'

  /iot/{device_did}/method-mappings-info:
    get:
      tags: [IoT]
      summary: Get device method mappings
      description: Public read at runtime — JWT/auth decision pending.
      operationId: iotMethodMappingsInfo
      security: []
      parameters:
        - $ref: '#/components/parameters/DeviceDid'
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/ServerError'

  /iot/standard-fields:
    get:
      tags: [IoT]
      summary: List standard fields
      description: Public read at runtime — JWT/auth decision pending.
      operationId: iotStandardFieldsList
      security: []
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [IoT]
      summary: Create standard field
      operationId: iotStandardFieldCreate
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /iot/standard-fields/{field_code}:
    get:
      tags: [IoT]
      summary: Get standard field by code
      description: Public read at runtime — JWT/auth decision pending.
      operationId: iotStandardFieldGet
      security: []
      parameters:
        - name: field_code
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags: [IoT]
      summary: Update standard field
      operationId: iotStandardFieldUpdate
      parameters:
        - name: field_code
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    delete:
      tags: [IoT]
      summary: Delete standard field
      operationId: iotStandardFieldDelete
      parameters:
        - name: field_code
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /iot/standard-methods:
    get:
      tags: [IoT]
      summary: List standard methods
      description: Public read at runtime — JWT/auth decision pending.
      operationId: iotStandardMethodsList
      security: []
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [IoT]
      summary: Create standard method
      operationId: iotStandardMethodCreate
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /iot/standard-methods/{method_code}:
    get:
      tags: [IoT]
      summary: Get standard method by code
      description: Public read at runtime — JWT/auth decision pending.
      operationId: iotStandardMethodGet
      security: []
      parameters:
        - name: method_code
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags: [IoT]
      summary: Update standard method
      operationId: iotStandardMethodUpdate
      parameters:
        - name: method_code
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    delete:
      tags: [IoT]
      summary: Delete standard method
      operationId: iotStandardMethodDelete
      parameters:
        - name: method_code
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /iot/device/{device_code}/test-sse-push:
    post:
      tags: [SSE]
      summary: Test SSE push (dev only)
      description: |
        Disabled in production (403). Non-production requires
        IBMS_SIMULATOR_ENABLED or IBMS_TESTMQTT_ENABLED. JWT required.
      operationId: sseTestPush
      parameters:
        - $ref: '#/components/parameters/DeviceCode'
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /did/system/init:
    post:
      tags: [DID]
      summary: Initialize system root entity
      operationId: didSystemInit
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /did/entity:
    post:
      tags: [DID]
      summary: Create sub-entity and issue VC
      operationId: didCreateEntity
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DidEntityRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /did/vp/generate:
    post:
      tags: [DID]
      summary: Generate verifiable presentation
      operationId: didVpGenerate
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Draft placeholder — holder_did, vcs, challenge
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /did/vc/reissue:
    post:
      tags: [DID]
      summary: Revoke and reissue VC
      operationId: didVcReissue
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DidCredentialRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /did/vc/revoke:
    post:
      tags: [DID]
      summary: Revoke VC
      description: |
        Revoke an issued verifiable credential. JWT required (SECURITY-A10, commit 898f99c).
        Request body is a draft placeholder — do not embed real VC, DID, or private key material in docs.
