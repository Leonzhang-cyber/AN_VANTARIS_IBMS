components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT from POST /did/login — use placeholder in docs only

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
    MenuId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    VersionId:
      name: version_id
      in: path
      required: true
      schema:
        type: string
    DeviceCode:
      name: device_code
      in: path
      required: true
      schema:
        type: string
    DeviceDid:
      name: device_did
      in: path
      required: true
      schema:
        type: string

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
      additionalProperties: true

    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          additionalProperties: true
      additionalProperties: true

    TraceableResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
      description: May correlate with X-Trace-Id in server logs

    DidEntityRequest:
      type: object
      additionalProperties: true
      description: Draft placeholder — see PERMISSION_MATRIX_A2

    DidCredentialRequest:
      type: object
      additionalProperties: true

    IoTCommandRequest:
      type: object
      required:
        - method
      properties:
        method:
          type: string
        params:
          type: object
          additionalProperties: true
      additionalProperties: true

    IoTIngestRequest:
      type: object
      required:
        - device_code
        - data
      properties:
        device_code:
          type: string
        data:
          type: object
          additionalProperties: true
      additionalProperties: true

  responses:
    Success:
      description: Success
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    UnauthorizedError:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Invalid token
    ForbiddenError:
      description: Valid JWT but missing required permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 403
            message: 'Permission denied: requires [modeling:train]'
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 500
            message: Internal error
