      summary: Update entity type
      operationId: frontendSystemEntityTypesUpdate
      security:
        - bearerAuth: []
      parameters:
        - name: type_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Authenticated user lacks required system permission. Runtime permission enforcement pending for system admin routes if not yet applied.
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags: [System]
      summary: Delete entity type
      operationId: frontendSystemEntityTypesDelete
      security:
        - bearerAuth: []
      parameters:
        - name: type_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Authenticated user lacks required system permission. Runtime permission enforcement pending for system admin routes if not yet applied.
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/ServerError'

  /system/entity-types/tree:
    get:
