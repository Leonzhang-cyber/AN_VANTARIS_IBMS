openapi: 3.0.3
info:
  title: VANTARIS IBMS Frontend API
  version: ibms.frontend.contract.v1
  description: |
    Frontend-facing API subset for VANTARIS IBMS Console migration.
    Aligns with AN_VANTARIS_IBMS-frontend domain API modules (FRONTEND-A4).

    Legacy backend prefix: `/api` (unversioned).
    Contract paths below are relative to server `/api` unless noted.

    x-ibms-backend-route annotations map contract paths to current Flask routes
    where they differ (e.g. menu CRUD uses `/system/menus-add` at runtime).

    Do not embed real tokens, DIDs, or secrets in examples.

servers:
  - url: /api
    description: Current backend API prefix

tags:
  - name: System
    description: System permissions and administration
  - name: Menu
    description: Menu and version management (JWT required; permission pending)
  - name: DID
    description: DID authentication and credential operations
  - name: IoT
    description: IoT device registry, command, and ingest
  - name: Modeling
    description: Data modeling and prediction

security:
  - bearerAuth: []

paths:
  /system/permissions:
    get:
      tags: [System]
      summary: List system permissions
      description: JWT required. Maps to GET `/system/permissions` (limit/offset query supported at runtime).
      operationId: frontendSystemPermissionsList
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [System]
      summary: Create system permission
      description: JWT required. Requires `perm_code` and `description` at runtime.
      operationId: frontendSystemPermissionsCreate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Authenticated user lacks required system permission. Runtime permission enforcement pending for menu routes if not yet applied.
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/ServerError'

  /system/permissions/{id}:
    get:
      tags: [System]
      summary: Get system permission by id
      operationId: frontendSystemPermissionsGet
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Permission not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags: [System]
      summary: Update system permission
      description: Runtime uses PUT (no PATCH). Body fields passed through to service layer.
      operationId: frontendSystemPermissionsUpdate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Authenticated user lacks required system permission. Runtime permission enforcement pending for menu routes if not yet applied.
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags: [System]
      summary: Delete system permission
      operationId: frontendSystemPermissionsDelete
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Authenticated user lacks required system permission. Runtime permission enforcement pending for menu routes if not yet applied.
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/ServerError'

