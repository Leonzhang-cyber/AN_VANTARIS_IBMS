        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [System]
      summary: Create entity type
      operationId: frontendSystemEntityTypesCreate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
