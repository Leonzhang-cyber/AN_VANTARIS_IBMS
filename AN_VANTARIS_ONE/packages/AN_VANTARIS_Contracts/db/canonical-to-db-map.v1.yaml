    retentionPolicy: "Long-lived, soft-delete allowed per governance."
    notes: "Configuration ownership remains Code-facing; DB stores implementation state."
  event:
    purpose: "Persist normalized operational events, alarms, and lifecycle transitions."
    canonicalObjects: [event, alarm, telemetry, health, throughput, syncBatch]
    ownerPackage: AN_VANTARIS_DB
    storageResponsibility: "Durable event stream views and alarm lifecycle history."
    retentionPolicy: "Policy-driven by compliance and operations profile."
    notes: "Designed for queryability and correlation across tenant/site and time windows."
  raw:
    purpose: "Preserve ingress payload snapshots and transport metadata for traceability."
    canonicalObjects: [telemetry, event, evidence]
    ownerPackage: AN_VANTARIS_DB
    storageResponsibility: "Raw payload archive and hash linkage."
    retentionPolicy: "Shorter TTL by default unless compliance hold applies."
