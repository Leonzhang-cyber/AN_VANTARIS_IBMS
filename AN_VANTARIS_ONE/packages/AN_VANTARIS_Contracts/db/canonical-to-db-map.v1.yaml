    ownerPackage: AN_VANTARIS_DB
    storageResponsibility: "Materialized projections and derived operational indicators."
    retentionPolicy: "Tiered retention based on product analytics policy."
    notes: "Derived values must preserve canonical IDs for lineage."
  audit:
    purpose: "Track change and action trails with actor/target references."
    canonicalObjects: [audit, configVersion, syncBatch]
    ownerPackage: AN_VANTARIS_DB
    storageResponsibility: "Immutable or append-preferred audit records."
    retentionPolicy: "Compliance retention class; do not purge without policy approval."
    notes: "Audit captures correlation and contract version context."

