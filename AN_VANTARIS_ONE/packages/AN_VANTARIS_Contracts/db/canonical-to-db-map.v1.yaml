principles:
  - "DB is implementation mapping, not contract authority."
  - "Code owns DB access and persistence orchestration."
  - "EDGE/LINK must not direct-write UFMS DB."
  - "Canonical identifiers must be preserved at published boundaries."
  - "DB may add indexes, foreign keys, and technical fields."
  - "Migrations must reference contractVersion milestones."
  - "Unknown optional fields must be tolerated upstream."

